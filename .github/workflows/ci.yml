name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          bb: 1.12.218
      - run: bun run check
      - run: bun run conformance
